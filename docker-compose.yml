services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_compass}
      POSTGRES_USER: ${POSTGRES_USER:-school_compass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-school_compass} -d ${POSTGRES_DB:-school_compass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgres://${POSTGRES_USER:-school_compass}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-school_compass}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
    ports:
      - "${APP_PORT:-8089}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
